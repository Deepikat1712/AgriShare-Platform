<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Equipment</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="form-container">
        <h2>🚜 Equipment Booking</h2>
        <form action="BookingServlet" method="post">
    <input type="text" name="user_name" placeholder="Farmer Name" required>

    <select name="equipment_name">
        <option>Select Equipment</option>
        <option>Tractor</option>
        <option>Harvester</option>
        <option>Sprayer</option>
    </select>

    <input type="date" name="date" required>

    <input type="number" name="days" placeholder="Number of Days" required>

    <button type="submit">Confirm Booking</button>
</form>
        
    </div>
    <script src="js/script.js"></script>

</body>
</html>
